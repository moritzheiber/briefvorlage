name: Build Example Letter PDF

on:
  push:
    paths:
      - example-letter.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install typst
        run: sudo snap install typst

      - name: Build PDF
        run: |
          pandoc example-letter.md --template=letter.typ --pdf-engine=typst -o example-letter.pdf

      - name: Commit and push PDF
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add example-letter.pdf
          git diff --cached --quiet || git commit -m "Update example-letter.pdf" && git push
