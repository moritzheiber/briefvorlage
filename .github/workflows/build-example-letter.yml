name: Build Example Letter PDF

on:
  push:
    paths:
      - example-letter.md
      - letter.typ
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: typst-community/setup-typst@v4
      - name: Install pandoc and poppler-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc poppler-utils
      - name: Build PDF
        run: |
          pandoc example-letter.md --template=letter.typ --pdf-engine=typst -o example-letter.pdf
      - name: Generate preview image
        run: |
          pdftoppm example-letter.pdf example-letter -png -f 1 -singlefile
      - name: Commit and push PDF and preview
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add example-letter.pdf example-letter.png
          git diff --cached --quiet || git commit -m "Update example-letter.pdf and preview" && git push
